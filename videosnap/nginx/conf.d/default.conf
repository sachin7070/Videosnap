# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=download:10m rate=5r/m;

# Upstream definitions
upstream frontend {
    server frontend:3000;
    keepalive 16;
}

upstream backend {
    server backend:5000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;   # Replace with your domain: videosnap.app www.videosnap.app

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ─── API → Backend ──────────────────────────────────────────────────────
    location /api/analyze {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/download {
        limit_req zone=download burst=3 nodelay;
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        # Long timeout for large video downloads
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        # Disable buffering so download streams to client
        proxy_buffering         off;
        proxy_request_buffering off;
    }

    location /health {
        proxy_pass http://backend;
    }

    # ─── Frontend → Next.js ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ─── Static assets ──────────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }
}

